name: Release binaries (Android only, no test gate)

# Builds signed Android binaries (.aab + .apk) using ANDROID_KEYSTORE_BASE64
# secret. Deliberately bypasses the heavy pre-release-tests gate so we can
# produce binaries for v1 even before iOS / watchOS / emulator tests pass.
#
# Triggered manually via workflow_dispatch. Uploads binaries as workflow
# artifacts AND attaches them to a draft GitHub Release named v<version>-android.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the binary (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build signed Android binaries
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD:  ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:          ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:       ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is empty - aborting." >&2
            exit 1
          fi
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore/upload.jks
          cat > android/keystore.properties <<EOF
          storeFile=keystore/upload.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true

      - name: Build release artefacts
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease

      - name: Stage outputs
        run: |
          mkdir -p staged
          cp android/app/build/outputs/apk/release/*.apk staged/ 2>/dev/null || echo 'no app apk'
          cp android/app/build/outputs/bundle/release/*.aab staged/ 2>/dev/null || echo 'no aab'
          ls -la staged/ || echo 'no staged outputs'

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: android-binaries-v${{ github.event.inputs.version }}
          path: staged/
          if-no-files-found: error
          retention-days: 30

      - name: Create or update draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ github.event.inputs.version }}-android"
          gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1 \
            && gh release upload "$VERSION" staged/* --repo "${{ github.repository }}" --clobber \
            || gh release create "$VERSION" staged/* \
                --repo "${{ github.repository }}" \
                --draft \
                --title "Android binaries $VERSION" \
                --notes "Self-signed Android binaries built by release-binaries-only workflow. Replace upload key and tag a real version when ready to publish."

