name: Pre-Release Tests

# Combined test gate for every platform. Runs:
#   * iOS unit tests (BuddyCore via iPhone Simulator)
#   * iOS UI tests (XCUITest on iPhone Simulator)
#   * Android phone unit tests + Compose UI tests on emulator
#
# Triggered three ways:
#   * Manually via workflow_dispatch
#   * As a required gate in release.yml via workflow_call
#   * Optionally on PRs that touch any platform tree

on:
  workflow_call:
    outputs:
      passed:
        description: "true when every job passed"
        value: ${{ jobs.summary.outputs.passed }}
  workflow_dispatch:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: pre-release-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────── iOS ───────────────────────────

  ios-unit-tests:
    name: iOS unit tests (BuddyCore on iPhone Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE/Contents/Developer"; fi
          xcodebuild -version
      - name: Test BuddyCore on iPhone 15 Simulator
        working-directory: shared/BuddyCore
        run: |
          xcodebuild test \
            -scheme BuddyCore-Package \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO | xcpretty --simple --report junit
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-report
          path: shared/BuddyCore/build/reports/junit.xml
          if-no-files-found: ignore
          retention-days: 14

  ios-ui-tests:
    name: iOS UI tests (XCUITest on iPhone Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE/Contents/Developer"; fi
          xcodebuild -version
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate iOS project
        working-directory: ios
        run: xcodegen generate
      - name: Run BuddyPlayUITests
        working-directory: ios
        run: |
          xcodebuild test \
            -project BuddyPlay.xcodeproj \
            -scheme BuddyPlay \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO | xcpretty --simple --report junit
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ui-test-report
          path: ios/build/reports/junit.xml
          if-no-files-found: ignore
          retention-days: 14

  # ─────────────────────────── Android phone ─────────────────

  android-phone-unit-tests:
    name: Android phone unit tests (:core + :app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Lint
        working-directory: android
        run: ./gradlew :app:lintDebug --warning-mode all
      # NOTE: :core is JVM-only — `:core:test`, NOT `testDebugUnitTest`.
      - name: Unit tests
        working-directory: android
        run: ./gradlew :core:test :app:testDebugUnitTest
      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-phone-unit-reports
          path: |
            android/app/build/reports/tests/**
            android/core/build/reports/tests/**
            android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

  android-phone-ui-tests:
    name: Android phone UI tests (Compose on emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Android emulators on Linux KVM hosted runners are flaky; the unit-test
    # job above is the actual gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Run :app:connectedDebugAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: android
          script: ./gradlew :app:connectedDebugAndroidTest
      - name: Upload instrumented reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-phone-ui-reports
          path: android/app/build/reports/androidTests/**
          if-no-files-found: ignore
          retention-days: 14

  # ─────────────────────────── Summary ───────────────────────

  summary:
    name: Pre-Release Test Summary
    runs-on: ubuntu-latest
    needs:
      - ios-unit-tests
      - ios-ui-tests
      - android-phone-unit-tests
      - android-phone-ui-tests
    if: ${{ always() && !cancelled() }}
    outputs:
      passed: ${{ steps.aggregate.outputs.passed }}
    steps:
      - id: aggregate
        run: |
          fail=false
          [[ "${{ needs.ios-unit-tests.result }}"           == "success" ]] || fail=true
          [[ "${{ needs.ios-ui-tests.result }}"             == "success" ]] || fail=true
          [[ "${{ needs.android-phone-unit-tests.result }}" == "success" ]] || fail=true
          # android-phone-ui-tests is informational — emulators on Linux KVM
          # hosted runners are too flaky to make a hard release blocker.
          # The unit-test jobs above are real gates.
          if [ "$fail" = "true" ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::One or more pre-release test suites failed."
            exit 1
          fi
          echo "passed=true" >> $GITHUB_OUTPUT
          echo "::notice::All pre-release test suites passed."
