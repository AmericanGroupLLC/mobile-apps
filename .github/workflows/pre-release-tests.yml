name: Pre-Release Tests

# Combined test gate for every platform. Runs:
#   * iOS unit tests (FitFusionCore via iPhone Simulator)
#   * iOS UI tests (XCUITest on iPhone Simulator)
#   * watchOS unit tests (Apple Watch Simulator)
#   * Android phone unit tests + Compose UI tests on emulator
#   * Wear OS unit tests + Compose UI tests on Wear emulator
#   * Backend Jest + smoke
#   * Expo Jest
#
# Triggered three ways:
#   * Manually via workflow_dispatch
#   * As a required gate in release.yml via workflow_call
#   * Optionally on PRs that touch any platform tree

on:
  workflow_call:
    outputs:
      passed:
        description: "true when every job passed"
        value: ${{ jobs.summary.outputs.passed }}
  workflow_dispatch:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: pre-release-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────── iOS ───────────────────────────

  ios-unit-tests:
    name: iOS unit tests (FitFusionCore on iPhone Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE/Contents/Developer"; fi
          xcodebuild -version
      - run: xcodebuild -version
      - name: Test FitFusionCore on iPhone 15 Simulator
        working-directory: shared/FitFusionCore
        run: |
          xcodebuild test \
            -scheme FitFusionCore-Package \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO | xcpretty --simple --report junit
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-report
          path: shared/FitFusionCore/build/reports/junit.xml
          if-no-files-found: ignore
          retention-days: 14

  ios-ui-tests:
    name: iOS UI tests (XCUITest on iPhone Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE/Contents/Developer"; fi
          xcodebuild -version
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate iOS project
        working-directory: ios
        run: xcodegen generate
      - name: Run FitFusionUITests
        working-directory: ios
        run: |
          xcodebuild test \
            -project FitFusion.xcodeproj \
            -scheme FitFusion \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO | xcpretty --simple --report junit
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ui-test-report
          path: ios/build/reports/junit.xml
          if-no-files-found: ignore
          retention-days: 14

  # ─────────────────────────── watchOS ───────────────────────

  watchos-unit-tests:
    name: Apple Watch unit tests (watchOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -s "$XCODE/Contents/Developer"; fi
          xcodebuild -version
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate watchOS project
        working-directory: watch
        run: xcodegen generate
      - name: Build watchOS for Simulator (smoke)
        working-directory: watch
        run: |
          xcodebuild build \
            -project HealthAppWatch.xcodeproj \
            -scheme HealthAppWatch \
            -sdk watchsimulator \
            -configuration Debug \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 10 (46mm),OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcpretty --simple
      # If/when XCTest target exists for the watch app, swap `build` for `test`.
      # For now FitFusionCore tests on iOS sim cover the shared logic and the
      # watchOS build itself acts as the smoke test.

  # ─────────────────────────── Android phone ─────────────────

  android-phone-unit-tests:
    name: Android phone unit tests (:core + :app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Lint
        working-directory: android
        run: ./gradlew :app:lintDebug --warning-mode all
      - name: Unit tests
        working-directory: android
        run: ./gradlew :core:testDebugUnitTest :app:testDebugUnitTest
      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-phone-unit-reports
          path: |
            android/app/build/reports/tests/**
            android/core/build/reports/tests/**
            android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

  android-phone-ui-tests:
    name: Android phone UI tests (Compose on emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Same caveat as wear-ui-tests: Android emulators on Linux KVM hosted
    # runners are flaky and shouldn't block production releases. The
    # android-phone-unit-tests job above is the actual gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Run :app:connectedDebugAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: android
          script: ./gradlew :app:connectedDebugAndroidTest
      - name: Upload instrumented reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-phone-ui-reports
          path: android/app/build/reports/androidTests/**
          if-no-files-found: ignore
          retention-days: 14

  # ─────────────────────────── Wear OS ───────────────────────

  wear-unit-tests:
    name: Wear OS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Unit tests
        working-directory: android
        run: ./gradlew :wear:testDebugUnitTest
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wear-unit-reports
          path: android/wear/build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 14

  wear-ui-tests:
    name: Wear OS UI tests (Wear emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Wear OS emulators on Linux KVM are notoriously flaky to boot.
    # The job is informational — its result does not block the release
    # pipeline. The Wear unit-test job above is the actual gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Run :wear:connectedDebugAndroidTest on Wear emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: android-wear
          arch: x86_64
          profile: wearos_round
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: android
          script: ./gradlew :wear:connectedDebugAndroidTest
      - name: Upload instrumented reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wear-ui-reports
          path: android/wear/build/reports/androidTests/**
          if-no-files-found: ignore
          retention-days: 14

  # ─────────────────────────── Backend / Expo ────────────────

  backend-tests:
    name: Backend Jest + smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Prepare .env
        run: |
          cp .env.example .env
          sed -i "s|JWT_SECRET=.*|JWT_SECRET=ci-secret-12345678901234567890ABCD|" .env
          sed -i "s|DB_PATH=.*|DB_PATH=/tmp/myhealth-prerelease.db|" .env
      - name: Jest with coverage
        run: npm test -- --coverage --runInBand --detectOpenHandles
      - name: Boot server in background
        run: |
          node server.js &
          echo $! > server.pid
          sleep 3
      - name: Smoke test
        run: node smoke.js
      - name: Stop server
        if: always()
        run: kill $(cat server.pid) || true

  expo-tests:
    name: Expo (mobile) Jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Jest with coverage
        run: npm run test:coverage

  # ─────────────────────────── Summary ───────────────────────

  summary:
    name: Pre-Release Test Summary
    runs-on: ubuntu-latest
    needs:
      - ios-unit-tests
      - ios-ui-tests
      - watchos-unit-tests
      - android-phone-unit-tests
      - android-phone-ui-tests
      - wear-unit-tests
      - wear-ui-tests
      - backend-tests
      - expo-tests
    if: ${{ always() && !cancelled() }}
    outputs:
      passed: ${{ steps.aggregate.outputs.passed }}
    steps:
      - id: aggregate
        run: |
          fail=false
          [[ "${{ needs.ios-unit-tests.result }}"          == "success" ]] || fail=true
          [[ "${{ needs.ios-ui-tests.result }}"            == "success" ]] || fail=true
          [[ "${{ needs.watchos-unit-tests.result }}"      == "success" ]] || fail=true
          [[ "${{ needs.android-phone-unit-tests.result }}" == "success" ]] || fail=true
          # android-phone-ui-tests + wear-ui-tests are informational —
          # emulators on Linux KVM hosted runners are too flaky to make
          # hard release blockers. The unit-test jobs above are real gates.
          [[ "${{ needs.wear-unit-tests.result }}"         == "success" ]] || fail=true
          [[ "${{ needs.backend-tests.result }}"           == "success" ]] || fail=true
          [[ "${{ needs.expo-tests.result }}"              == "success" ]] || fail=true
          if [ "$fail" = "true" ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::One or more pre-release test suites failed."
            exit 1
          fi
          echo "passed=true" >> $GITHUB_OUTPUT
          echo "::notice::All pre-release test suites passed."
