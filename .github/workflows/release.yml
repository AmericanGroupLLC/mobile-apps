name: Release

# Triggered when you push a tag like v1.2.0 or v1.2.0-rc1.
# Builds every binary, attaches to a GitHub Release, optionally
# uploads the Android AAB to Google Play.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create a Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Build artefacts in parallel
  # ─────────────────────────────────────────────────────────────────

  build-android:
    name: Build Android phone + Wear (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore/upload.jks
          cat > android/keystore.properties <<EOF
          storeFile=keystore/upload.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10 || true
          chmod +x gradlew || true
      - name: Build phone APK + AAB
        working-directory: android
        run: ./gradlew :app:assembleRelease :app:bundleRelease
      - name: Build Wear APK
        working-directory: android
        run: ./gradlew :wear:assembleRelease
      - name: Stage outputs
        run: |
          mkdir -p staging
          VERSION=${GITHUB_REF_NAME}
          cp android/app/build/outputs/apk/release/app-release.apk \
             staging/MyHealth-${VERSION}.apk || true
          cp android/app/build/outputs/bundle/release/app-release.aab \
             staging/MyHealth-${VERSION}.aab || true
          cp android/wear/build/outputs/apk/release/wear-release.apk \
             staging/MyHealth-Wear-${VERSION}.apk || true
      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: staging/*

  build-ios:
    name: Build iOS XCArchive
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate
      - name: Build unsigned archive
        working-directory: ios
        run: |
          mkdir -p build
          xcodebuild -project FitFusion.xcodeproj \
            -scheme FitFusion \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -archivePath build/MyHealth.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive | xcpretty --simple || true
      - name: Stage outputs
        run: |
          mkdir -p staging
          VERSION=${GITHUB_REF_NAME}
          # Zip the .xcarchive; signing/.ipa export needs Apple credentials,
          # gated below.
          if [ -d ios/build/MyHealth.xcarchive ]; then
            (cd ios/build && zip -r ../../staging/MyHealth-${VERSION}-iOS.xcarchive.zip MyHealth.xcarchive)
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: staging/*

  build-server:
    name: Build server tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm ci --omit=dev
      - name: Stage tarball
        run: |
          mkdir -p staging
          VERSION=${GITHUB_REF_NAME}
          tar --exclude='node_modules/.cache' \
              -czf staging/myhealth-server-${VERSION}.tgz \
              -C server .
      - uses: actions/upload-artifact@v4
        with:
          name: server-release
          path: staging/*

  build-web:
    name: Build web (marketing site) zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage zip
        run: |
          mkdir -p staging
          VERSION=${GITHUB_REF_NAME}
          zip -r staging/myhealth-web-${VERSION}.zip \
            index.html styles.css script.js
      - uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: staging/*

  # ─────────────────────────────────────────────────────────────────
  # 2. Aggregate + create GitHub Release
  # ─────────────────────────────────────────────────────────────────

  publish-github-release:
    name: Create GitHub Release
    needs: [build-android, build-ios, build-server, build-web]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten dist directory
        run: |
          mkdir -p flat
          find dist -type f -exec cp {} flat/ \;
          ls -la flat/
      - id: meta
        run: |
          VERSION=${GITHUB_REF_NAME}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-rc* || "$VERSION" == *-beta* || "$VERSION" == *-alpha* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Generate release notes
        id: notes
        run: |
          echo "# MyHealth ${GITHUB_REF_NAME}" > NOTES.md
          echo "" >> NOTES.md
          PREV=$(git tag --sort=-creatordate | grep -A1 "^${GITHUB_REF_NAME}$" | tail -n1 || true)
          if [ -n "$PREV" ] && [ "$PREV" != "$GITHUB_REF_NAME" ]; then
            echo "## Changes since $PREV" >> NOTES.md
            git log --pretty=format:'- %s (%h)' "$PREV..HEAD" >> NOTES.md
          else
            echo "## Changes" >> NOTES.md
            git log --pretty=format:'- %s (%h)' -n 50 >> NOTES.md
          fi
          echo "" >> NOTES.md
          echo "## Artefacts" >> NOTES.md
          ls flat | sed 's/^/- /' >> NOTES.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MyHealth ${{ github.ref_name }}
          body_path: NOTES.md
          draft: false
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          generate_release_notes: false
          files: flat/*

  # ─────────────────────────────────────────────────────────────────
  # 3. Optional: upload to Google Play (gated by secret)
  # ─────────────────────────────────────────────────────────────────

  publish-play-store:
    name: Upload AAB to Google Play
    needs: publish-github-release
    runs-on: ubuntu-latest
    if: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: android-release
          path: dist
      - name: Pick AAB
        id: pick
        run: |
          AAB=$(ls dist/*.aab | head -n1)
          echo "aab=$AAB" >> $GITHUB_OUTPUT
      - name: Determine track
        id: track
        run: |
          VERSION=${GITHUB_REF_NAME}
          case "$VERSION" in
            *-internal*) echo "track=internal"  >> $GITHUB_OUTPUT ;;
            *-alpha*)    echo "track=alpha"     >> $GITHUB_OUTPUT ;;
            *-beta*|*-rc*) echo "track=beta"    >> $GITHUB_OUTPUT ;;
            *)           echo "track=production">> $GITHUB_OUTPUT ;;
          esac
      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_STORE_PACKAGE_NAME }}
          releaseFiles: ${{ steps.pick.outputs.aab }}
          track: ${{ steps.track.outputs.track }}
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: distribution/whatsnew
