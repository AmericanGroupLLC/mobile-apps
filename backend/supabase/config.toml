# Drift Supabase project config (auto-generated by `supabase init`,
# committed so collaborators can `supabase start` from a fresh clone).
project_id = "drift"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"
[storage.image_transformation]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/*"]
jwt_expiry = 3600
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your Drift code is {{ .Code }}"
[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

[edge_runtime]
enabled = true
inspector_port = 8083
policy = "oneshot"

[functions.reply-suggest]
verify_jwt = true

[functions.verify-selfie]
verify_jwt = true

[functions.fuzz-location]
verify_jwt = true

[functions.wipe-me]
verify_jwt = true
