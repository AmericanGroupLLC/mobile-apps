name: BuddyPlay
options:
  bundleIdPrefix: com.americangroupllc
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.buddyplay
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: "1"

packages:
  BuddyCore:
    path: ../shared/BuddyCore

targets:
  BuddyPlay:
    type: application
    platform: iOS
    sources:
      - path: BuddyPlay
        excludes:
          - "**/*.md"
    resources:
      - path: BuddyPlay/Resources/Assets.xcassets
      - path: BuddyPlay/Resources/LaunchScreen.storyboard
    info:
      path: BuddyPlay/Resources/Info.plist
    entitlements:
      path: BuddyPlay/Resources/BuddyPlay.entitlements
    dependencies:
      - package: BuddyCore
        product: BuddyCore
      - sdk: Network.framework
      - sdk: CoreBluetooth.framework
      - sdk: AVFoundation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.buddyplay
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  BuddyPlayTests:
    type: bundle.unit-test
    platform: iOS
    sources: [BuddyPlayTests]
    dependencies:
      - target: BuddyPlay
      - package: BuddyCore
        product: BuddyCore

  BuddyPlayUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [BuddyPlayUITests]
    dependencies:
      - target: BuddyPlay

schemes:
  BuddyPlay:
    build:
      targets:
        BuddyPlay: all
    test:
      targets:
        - BuddyPlayTests
        - BuddyPlayUITests
    run:
      config: Debug
