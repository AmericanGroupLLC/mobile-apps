name: Pocket
options:
  bundleIdPrefix: com.americangroupllc
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.pocket
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  PocketCore:
    path: ../shared/PocketCore

targets:
  Pocket:
    type: application
    platform: iOS
    sources:
      - path: Pocket
        excludes:
          - "**/*.md"
    resources:
      - path: Pocket/Resources/Assets.xcassets
      - path: Pocket/Resources/LaunchScreen.storyboard
    info:
      path: Pocket/Resources/Info.plist
    entitlements:
      path: Pocket/Resources/Pocket.entitlements
    dependencies:
      - package: PocketCore
        product: PocketCore
      - sdk: ARKit.framework
      - sdk: SceneKit.framework
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.pocket
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  PocketTests:
    type: bundle.unit-test
    platform: iOS
    sources: [PocketTests]
    dependencies:
      - target: Pocket
      - package: PocketCore
        product: PocketCore

  PocketUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [PocketUITests]
    dependencies:
      - target: Pocket

schemes:
  Pocket:
    build:
      targets:
        Pocket: all
    test:
      targets:
        - PocketTests
        - PocketUITests
    run:
      config: Debug
