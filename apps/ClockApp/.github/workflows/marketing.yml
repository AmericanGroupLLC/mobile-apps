name: Marketing site (GitHub Pages)

on:
  push:
    branches: [master]
    paths:
      - 'index.html'
      - 'styles.css'
      - 'script.js'
      - 'robots.txt'
      - 'sitemap.xml'
      - '.github/workflows/marketing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir _site
          cp index.html styles.css script.js robots.txt sitemap.xml _site/
      # GitHub Pages cannot be enabled by GITHUB_TOKEN — repo admin must
      # toggle it once at Settings → Pages → Source: GitHub Actions.
      # Until that's done these steps no-op gracefully so the workflow
      # still passes.
      - id: pages_config
        uses: actions/configure-pages@v5
        continue-on-error: true
      - name: Pages not enabled — skipping deploy
        if: steps.pages_config.outcome != 'success'
        run: |
          echo "::warning::Enable GitHub Pages once at Settings → Pages → Source: GitHub Actions."
          echo "::notice::Skipping deploy this run."
      - uses: actions/upload-pages-artifact@v3
        if: steps.pages_config.outcome == 'success'
        with:
          path: _site
      - id: deploy
        if: steps.pages_config.outcome == 'success'
        uses: actions/deploy-pages@v4
