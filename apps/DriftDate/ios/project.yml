name: Drift
options:
  bundleIdPrefix: com.americangroupllc
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.drift
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  DriftCore:
    path: ../shared/DriftCore

targets:
  Drift:
    type: application
    platform: iOS
    sources:
      - path: Drift
        excludes:
          - "**/*.md"
    resources:
      - path: Drift/Resources/Assets.xcassets
      - path: Drift/Resources/LaunchScreen.storyboard
    info:
      path: Drift/Resources/Info.plist
    entitlements:
      path: Drift/Resources/Drift.entitlements
    dependencies:
      - package: DriftCore
        product: DriftCore
      - target: DriftNotificationService
      - sdk: UserNotifications.framework
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: CoreImage.framework
      - sdk: PhotosUI.framework
      - sdk: CoreLocation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.drift
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  DriftNotificationService:
    type: app-extension
    platform: iOS
    sources: [DriftNotificationService]
    info:
      path: DriftNotificationService/Info.plist
    entitlements:
      path: DriftNotificationService/DriftNotificationService.entitlements
    dependencies:
      - package: DriftCore
        product: DriftCore
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.drift.notify
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.usernotifications.service

  DriftTests:
    type: bundle.unit-test
    platform: iOS
    sources: [DriftTests]
    dependencies:
      - target: Drift
      - package: DriftCore
        product: DriftCore

  DriftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [DriftUITests]
    dependencies:
      - target: Drift

schemes:
  Drift:
    build:
      targets:
        Drift: all
        DriftNotificationService: all
    test:
      targets:
        - DriftTests
        - DriftUITests
    run:
      config: Debug
