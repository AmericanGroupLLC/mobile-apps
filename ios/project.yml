name: OfflineAIBuddy
options:
  bundleIdPrefix: com.americangroupllc
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.offlineaibuddy
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: "1"

packages:
  BuddyAICore:
    path: ../shared/BuddyAICore

targets:
  OfflineAIBuddy:
    type: application
    platform: iOS
    sources:
      - path: OfflineAIBuddy
        excludes:
          - "**/*.md"
    resources:
      - path: OfflineAIBuddy/Resources/Assets.xcassets
      - path: OfflineAIBuddy/Resources/LaunchScreen.storyboard
    info:
      path: OfflineAIBuddy/Resources/Info.plist
    entitlements:
      path: OfflineAIBuddy/Resources/OfflineAIBuddy.entitlements
    dependencies:
      - package: BuddyAICore
        product: BuddyAICore
      - target: OfflineAIBuddyKeyboard
      - sdk: AVFoundation.framework
      - sdk: Speech.framework
      - sdk: BackgroundTasks.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.offlineaibuddy
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"

  OfflineAIBuddyKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: OfflineAIBuddyKeyboard
        excludes:
          - "**/*.md"
    info:
      path: OfflineAIBuddyKeyboard/Info.plist
    entitlements:
      path: OfflineAIBuddyKeyboard/OfflineAIBuddyKeyboard.entitlements
    dependencies:
      - package: BuddyAICore
        product: BuddyAICore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.americangroupllc.offlineaibuddy.keyboard
        SKIP_INSTALL: YES

  OfflineAIBuddyTests:
    type: bundle.unit-test
    platform: iOS
    sources: [OfflineAIBuddyTests]
    dependencies:
      - target: OfflineAIBuddy
      - package: BuddyAICore
        product: BuddyAICore

  OfflineAIBuddyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [OfflineAIBuddyUITests]
    dependencies:
      - target: OfflineAIBuddy

schemes:
  OfflineAIBuddy:
    build:
      targets:
        OfflineAIBuddy: all
        OfflineAIBuddyKeyboard: all
    test:
      targets:
        - OfflineAIBuddyTests
        - OfflineAIBuddyUITests
    run:
      config: Debug
